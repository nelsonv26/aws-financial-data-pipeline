version: 2

sources:
  - name: finance_raw
    database: AwsDataCatalog
    schema: financial_data_lake
    tables:
      - name: processed_finance_partitioned
models:
  - name: stg_financial_data
    columns:

      - name: date
        tests:
          - not_null

      - name: stock_index
        tests:
          - not_null

      - name: close_price
        tests:
          - not_null

      - name: trading_volume
        tests:
          - not_null