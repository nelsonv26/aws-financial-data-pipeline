name: dbt CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  dbt-tests:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dbt
      run: |
        pip install dbt-core
        pip install dbt-athena-community

    - name: Run dbt tests
      run: |
        dbt deps
        dbt run
        dbt test